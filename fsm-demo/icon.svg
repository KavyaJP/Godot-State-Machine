<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a303c" />
      <stop offset="100%" stop-color="#1b1f27" />
    </linearGradient>

    <linearGradient id="boxActive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#478cbf" />
      <stop offset="100%" stop-color="#36719e" />
    </linearGradient>
    <linearGradient id="boxInactive" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a303c" />
      <stop offset="100%" stop-color="#1e222b" />
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <marker id="arrow" viewBox="0 0 10 10" refX="14" refY="5" markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#6c7f93" />
    </marker>
    <marker id="arrow-active" viewBox="0 0 10 10" refX="14" refY="5" markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#82c0f9" />
    </marker>

    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#ffffff" opacity="0.05" />
    </pattern>
  </defs>

  <rect width="256" height="256" rx="40" fill="url(#bgGrad)" />
  
  <rect width="256" height="256" rx="40" fill="url(#grid)" />

  <g opacity="0.04" fill="#ffffff" transform="translate(128, 134)">
    <circle cx="0" cy="0" r="50" />
    <rect x="-12" y="-60" width="24" height="120" rx="4" />
    <rect x="-12" y="-60" width="24" height="120" rx="4" transform="rotate(45)" />
    <rect x="-12" y="-60" width="24" height="120" rx="4" transform="rotate(90)" />
    <rect x="-12" y="-60" width="24" height="120" rx="4" transform="rotate(135)" />
    <circle cx="0" cy="0" r="35" fill="#1b1f27" />
  </g>

  <path d="M 118 88 C 118 120, 82 120, 82 160" fill="none" stroke="#82c0f9" stroke-width="4" marker-end="url(#arrow-active)" />
  
  <path d="M 112 180 L 144 180" fill="none" stroke="#6c7f93" stroke-width="3" marker-end="url(#arrow)" />
  
  <path d="M 174 160 C 174 125, 138 125, 138 88" fill="none" stroke="#6c7f93" stroke-width="3" marker-end="url(#arrow)" />

  <g filter="url(#shadow)">
    <rect x="88" y="48" width="80" height="40" rx="12" fill="url(#boxActive)" stroke="#92cbfb" stroke-width="2"/>
    <path d="M 94 62 L 104 68 L 94 74 Z" fill="#ffffff" />
    <text x="134" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle" user-select="none">IDLE</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="32" y="160" width="80" height="40" rx="12" fill="url(#boxInactive)" stroke="#424a59" stroke-width="2"/>
    <text x="72" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#a5b7c6" text-anchor="middle" user-select="none">RUN</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="144" y="160" width="80" height="40" rx="12" fill="url(#boxInactive)" stroke="#424a59" stroke-width="2"/>
    <text x="184" y="186" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#a5b7c6" text-anchor="middle" user-select="none">JUMP</text>
  </g>

  <circle cx="118" cy="88" r="4" fill="#2a303c" stroke="#82c0f9" stroke-width="2" />
  <circle cx="138" cy="88" r="4" fill="#2a303c" stroke="#6c7f93" stroke-width="2" />
  
  <circle cx="82" cy="160" r="4" fill="#2a303c" stroke="#82c0f9" stroke-width="2" />
  <circle cx="112" cy="180" r="4" fill="#2a303c" stroke="#6c7f93" stroke-width="2" />
  
  <circle cx="144" cy="180" r="4" fill="#2a303c" stroke="#6c7f93" stroke-width="2" />
  <circle cx="174" cy="160" r="4" fill="#2a303c" stroke="#6c7f93" stroke-width="2" />
</svg>
