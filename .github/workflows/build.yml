name: Build GDExtension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
            arch: x86_64
          - platform: macos
            os: macos-latest
            arch: universal
          - platform: ios
            os: macos-latest
            arch: arm64
          - platform: web
            os: ubuntu-latest
            arch: wasm32

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install SCons
        run: pip install scons

      - name: Setup Emscripten (Web Only)
        if: matrix.platform == 'web'
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.39
          actions-cache-folder: "emsdk-cache"

      - name: Build Debug Target
        run: |
          scons platform=${{ matrix.platform }} target=template_debug arch=${{ matrix.arch }}

      - name: Build Release Target
        run: |
          scons platform=${{ matrix.platform }} target=template_release arch=${{ matrix.arch }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          # Changed from bin/ to fsm-demo/bin/ to match SConstruct output
          path: fsm-demo/node_state_controller/bin/
